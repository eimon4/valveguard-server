<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – ValveGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <style>body { font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

  <nav class="border-b border-gray-200 bg-white px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="font-bold text-lg tracking-tight">ValveGuard.</a>
    <a href="login.html" class="text-sm text-gray-600 hover:text-black">Login</a>
  </nav>

  <main class="flex-grow flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-white p-8 border border-gray-200 shadow-sm">
      <h1 class="text-2xl font-bold mb-6">Reset Password</h1>
      
      <div id="alert-box" class="hidden mb-4 p-3 text-sm border"></div>

      <form id="reset-form">
        <div class="space-y-4">
          <div>
            <label class="block text-sm text-gray-600 mb-1">Email</label>
            <input id="email" type="email" required class="w-full border border-gray-300 p-2 text-sm focus:outline-none focus:border-black" />
          </div>
          <button id="reset-btn" type="submit" class="w-full bg-black text-white p-3 text-sm font-medium hover:bg-gray-800">
            Send Reset Link
          </button>
        </div>
      </form>
    </div>
  </main>

  <script>


    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('reset-btn');

      if (!email) return showAlert('Email required.');

      btn.disabled = true;
      btn.textContent = 'Wait...';

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      });

      if (error) {
        showAlert(error.message);
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      } else {
        showAlert('Reset link sent to your email.', false);
        btn.textContent = 'Done';
      }
    });
  </script>
</body>
</html>
